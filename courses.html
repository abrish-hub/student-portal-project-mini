<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .course-card { background: #1e1e1e; border-radius: 15px; padding: 30px; border: 1px solid #333; }
        .form-check-input:checked { background-color: #2ecc71; border-color: #2ecc71; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 course-card">
                <h3 class="text-success fw-bold mb-4">Course Selection</h3>
                <div class="form-check mb-3">
                    <input class="form-check-input opt" type="checkbox" value="Web Engineering">
                    <label class="form-check-label">Web Engineering</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input opt" type="checkbox" value="Cyber Security">
                    <label class="form-check-label">Cyber Security</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input opt" type="checkbox" value="Data Science">
                    <label class="form-check-label">Data Science</label>
                </div>
                <button onclick="submit()" class="btn btn-success w-100 mt-3">Enroll Now</button>
                <a href="dashboard.html" class="btn btn-link text-secondary w-100 mt-2 text-decoration-none">Back</a>
            </div>
        </div>
    </div>
    <script>
        function submit() {
            let selected = [];
            document.querySelectorAll('.opt:checked').forEach(c => selected.push(c.value));
            alert(selected.length ? "Enrolled in: " + selected.join(", ") : "Please select a course!");
        }
    </script>
</body>
</html>
