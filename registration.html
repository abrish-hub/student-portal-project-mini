<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .reg-card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 30px; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; color: white; border-color: #2ecc71; box-shadow: none; }
        label { color: #2ecc71; font-size: 0.9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 reg-card shadow-lg">
                <h3 class="text-center mb-4 fw-bold">Student Registration</h3>
                <form id="regForm">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control mb-3">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control mb-3">
                    <label>Password</label>
                    <input type="password" id="pass" class="form-control mb-3">
                    <label>Confirm Password</label>
                    <input type="password" id="cPass" class="form-control mb-3">
                    <label>Age</label>
                    <input type="number" id="age" class="form-control mb-4">
                    <button type="button" onclick="validate()" class="btn btn-success w-100 fw-bold">Register</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        function validate() {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const cp = document.getElementById('cPass').value;
            const a = document.getElementById('age').value;

            if(!n || !e || !p || !a) { alert("Please fill all fields!"); return; }
            if(p !== cp) { alert("Passwords do not match!"); return; }
            if(isNaN(a) || a < 1) { alert("Enter a valid age!"); return; }
            
            localStorage.setItem("user", n);
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
