<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #1a1a1a; border-bottom: 2px solid #2ecc71; }
        .card { background: #1e1e1e; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #2ecc71; }
        .card-title { color: #ffffff; font-weight: bold; }
        .card-text { color: #b0b0b0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark p-3">
        <div class="container">
            <span class="navbar-brand text-success fw-bold">DASHBOARD</span>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5 text-center">
        <h2 id="greet" class="fw-bold"></h2>
        <button class="btn btn-outline-success btn-sm my-3" onclick="showTime()">Show Current Time</button>
        <p id="time" class="text-info"></p>

        <div class="row g-4 mt-2 text-start">
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h4 class="card-title">Courses</h4>
                    <p class="card-text">View and manage your academic modules.</p>
                    <a href="courses.html" class="btn btn-success mt-auto">Open</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h4 class="card-title">Feedback</h4>
                    <p class="card-text">Submit your reviews and suggestions.</p>
                    <a href="feedback.html" class="btn btn-success mt-auto">Open</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h4 class="card-title">Settings</h4>
                    <p class="card-text">Manage your profile and privacy.</p>
                    <button class="btn btn-secondary mt-auto" disabled>Soon</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('greet').innerText = "Welcome, " + (localStorage.getItem("user") || "Student");
        function showTime() { document.getElementById('time').innerText = new Date().toLocaleString(); }
    </script>
</body>
</html>
